[labels]
app.name = የመተግበሪያ አሳታሚ

# Error messages used by a.error.label(...). Generated keys mirror
# the previous hardcoded a.error() literals.
errors.invalid_app_id = ልክ ያልሆነ የመተግበሪያ መታወቂያ
errors.app_not_found = መተግበሪያ አልተገኘም
errors.invalid_app_name = ልክ ያልሆነ የመተግበሪያ ስም
errors.invalid_privacy = ልክ ያልሆነ ግላዊነት
errors.invalid_distribution = ልክ ያልሆነ ስርጭት
errors.failed_to_create_app_entity = የመተግበሪያ አካል መፍጠር አልተሳካም
errors.access_denied = መዳረሻ ተከልክሏል
errors.file_name_invalid = የፋይል ስም ልክ አይደለም
errors.failed_to_read_app_info_from_archive = ከመዝገብ የመተግበሪያ መረጃ ማንበብ አልተሳካም
errors.failed_to_install_app_version = የመተግበሪያ እትም መጫን አልተሳካም
errors.invalid_track_name = ልክ ያልሆነ የትራክ ስም
errors.invalid_version = ልክ ያልሆነ እትም
errors.version_not_found = እትም አልተገኘም
errors.track_already_exists = ትራክ አስቀድሞ አለ
errors.track_not_found = ትራክ አልተገኘም
errors.cannot_delete_the_default_track = ነባሪውን ትራክ መሰረዝ አይቻልም
errors.paths_mismatch = መንገዶች አይዛመዱም፡ የተጠበቀው {expected}፣ የመጣው {got}። ለመሻር force=yes ይጠቀሙ።
