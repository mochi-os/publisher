[labels]
app.name = App ප්‍රකාශක

# Error messages used by a.error.label(...). Generated keys mirror
# the previous hardcoded a.error() literals.
errors.invalid_app_id = වලංගු නොවන app ID
errors.app_not_found = App සොයාගත නොහැකි විය
errors.invalid_app_name = වලංගු නොවන app නාමය
errors.invalid_privacy = වලංගු නොවන රහස්‍යතා
errors.invalid_distribution = වලංගු නොවන බෙදාහැරීම
errors.failed_to_create_app_entity = App ඒකකය සෑදීමට අසමත් විය
errors.access_denied = ප්‍රවේශය ප්‍රතික්ෂේප විය
errors.file_name_invalid = ගොනු නාමය වලංගු නොවේ
errors.failed_to_read_app_info_from_archive = සංරක්ෂිතයෙන් app තොරතුරු කියවීමට අසමත් විය
errors.failed_to_install_app_version = app අනුවාදය ස්ථාපනය කිරීමට අසමත් විය
errors.invalid_track_name = වලංගු නොවන මාර්ග නාමය
errors.invalid_version = වලංගු නොවන අනුවාදය
errors.version_not_found = අනුවාදය සොයාගත නොහැකි විය
errors.track_already_exists = මාර්ගය දැනටමත් පවතී
errors.track_not_found = මාර්ගය සොයාගත නොහැකි විය
errors.cannot_delete_the_default_track = පෙරනිමි මාර්ගය මැකිය නොහැක
errors.paths_mismatch = මාර්ග නොගැලපීම: {expected} අපේක්ෂිත, {got} ලැබුණි. අභිබවා යාමට force=yes භාවිතා කරන්න.
