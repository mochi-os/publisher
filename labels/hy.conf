[labels]
app.name = Հավելվածի հրատարակիչ

# Error messages used by a.error.label(...). Generated keys mirror
# the previous hardcoded a.error() literals.
errors.invalid_app_id = Անվավեր հավելվածի ID
errors.app_not_found = Հավելվածը չի գտնվել
errors.invalid_app_name = Անվավեր հավելվածի անուն
errors.invalid_privacy = Անվավեր գաղտնիություն
errors.invalid_distribution = Անվավեր բաշխում
errors.failed_to_create_app_entity = Չհաջողվեց ստեղծել հավելվածի կազմակերպություն
errors.access_denied = Մուտքն արգելված է
errors.file_name_invalid = Ֆայլի անունն անվավեր է
errors.failed_to_read_app_info_from_archive = Չհաջողվեց կարդալ հավելվածի տվյալներն արխիվից
errors.failed_to_install_app_version = Չհաջողվեց տեղադրել հավելվածի տարբերակը
errors.invalid_track_name = Անվավեր track-ի անուն
errors.invalid_version = Անվավեր տարբերակ
errors.version_not_found = Տարբերակը չի գտնվել
errors.track_already_exists = Track-ն արդեն գոյություն ունի
errors.track_not_found = Track-ը չի գտնվել
errors.cannot_delete_the_default_track = Չի կարելի ջնջել հիմնական track-ը
errors.paths_mismatch = Ուղիների անհամապատասխանություն. ակնկալվում էր {expected}, ստացվեց {got}։ Օգտագործեք force=yes-ը անտեսելու համար։
