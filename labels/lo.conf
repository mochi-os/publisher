[labels]
app.name = ຜູ້ເຜີຍແຜ່ແອັບ

# Error messages used by a.error.label(...). Generated keys mirror
# the previous hardcoded a.error() literals.
errors.invalid_app_id = ID ແອັບບໍ່ຖືກຕ້ອງ
errors.app_not_found = ບໍ່ພົບແອັບ
errors.invalid_app_name = ຊື່ແອັບບໍ່ຖືກຕ້ອງ
errors.invalid_privacy = ຄວາມເປັນສ່ວນຕົວບໍ່ຖືກຕ້ອງ
errors.invalid_distribution = ການແຈກຢາຍບໍ່ຖືກຕ້ອງ
errors.failed_to_create_app_entity = ບໍ່ສາມາດສ້າງເອນທິຕີແອັບ
errors.access_denied = ການເຂົ້າເຖິງຖືກປະຕິເສດ
errors.file_name_invalid = ຊື່ໄຟລ໌ບໍ່ຖືກຕ້ອງ
errors.failed_to_read_app_info_from_archive = ບໍ່ສາມາດອ່ານຂໍ້ມູນແອັບຈາກ archive
errors.failed_to_install_app_version = ບໍ່ສາມາດຕິດຕັ້ງເວີຊັນແອັບ
errors.invalid_track_name = ຊື່ແທຣັກບໍ່ຖືກຕ້ອງ
errors.invalid_version = ເວີຊັນບໍ່ຖືກຕ້ອງ
errors.version_not_found = ບໍ່ພົບເວີຊັນ
errors.track_already_exists = ມີແທຣັກຢູ່ແລ້ວ
errors.track_not_found = ບໍ່ພົບແທຣັກ
errors.cannot_delete_the_default_track = ບໍ່ສາມາດລຶບແທັກມາດຕະຖານ
errors.paths_mismatch = ເສັ້ນທາງບໍ່ຕົງກັນ: ຄາດຫວັງ {expected}, ໄດ້ {got}. ໃຊ້ force=yes ເພື່ອບັງຄັບ.
